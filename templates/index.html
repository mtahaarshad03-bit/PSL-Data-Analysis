<!DOCTYPE html>
<html>
<head>
    <title>PSL AI Elite Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #39ff14; 
            --bg: #0a0a0c; 
            --glass: rgba(255,255,255,0.05); 
        }
        
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            display: flex; 
            overflow-x: hidden;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                              url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1605');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            filter: blur(4px) brightness(30%); 
            z-index: -1;
            transform: scale(1.1);
        }

        .sidebar { 
            width: 300px; 
            background: rgba(10, 10, 15, 0.9); 
            padding: 30px; 
            border-right: 1px solid rgba(57, 255, 20, 0.2); 
            height: 100vh; 
            position: fixed; 
            backdrop-filter: blur(15px);
            z-index: 100;
        }

        .content { 
            margin-left: 330px; 
            padding: 40px; 
            width: calc(100% - 330px); 
            position: relative; 
        }

        .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 24px; 
            padding: 25px; 
            backdrop-filter: blur(20px); 
            margin-bottom: 25px; 
            transition: 0.4s; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glass-card:hover { 
            border-color: var(--neon); 
            transform: translateY(-5px); 
        }

        select, button { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid rgba(57, 255, 20, 0.3); background: #111; color: white; 
            cursor: pointer; font-family: 'Poppins';
        }

        .btn-neon { background: var(--neon); color: black; font-weight: 700; border: none; text-transform: uppercase; }
        .btn-neon:hover { box-shadow: 0 0 25px var(--neon); }
        
        .btn-pdf { 
            background: transparent; 
            color: #fff; 
            font-weight: 700; 
            border: 1px solid rgba(255,255,255,0.15); 
            margin-bottom: 15px; 
            backdrop-filter: blur(10px); 
        }

        .stat-val { color: var(--neon); font-size: 2.8em; font-weight: 700; margin: 0; text-shadow: 0 0 15px rgba(57,255,20,0.3); }
        .grid { display: flex; gap: 20px; }
        h1 { font-size: 2.5em; font-weight: 700; }
        label { font-size: 0.7em; color: var(--neon); font-weight: 600; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="color:var(--neon); margin-bottom:30px;">PSL AI ELITE</h2>
    <label>SELECT TEAM</label>
    <select id="teamFilter" onchange="updateDashboard()">
        <option value="All Teams">All Teams</option>
        {% for t in teams %}<option>{{t}}</option>{% endfor %}</select>
    <button class="btn-pdf" onclick="downloadPDF()">⬇️ EXPORT REPORT (PDF)</button>
    <hr style="opacity:0.1; margin:30px 0;">
    <h3 style="font-size: 0.9em; color:#fff;">MATCH PREDICTOR</h3>
    <label>TEAM 1</label>
    <select id="predT1">{% for t in teams %}<option>{{t}}</option>{% endfor %}</select>
    <label>TEAM 2</label>
    <select id="predT2">{% for t in teams %}<option>{{t}}</option>{% endfor %}</select>
    <label>VENUE</label>
    <select id="predV">{% for v in venues %}<option>{{v}}</option>{% endfor %}</select>
    <button class="btn-neon" onclick="runPrediction()">⚡ RUN AI MODEL</button>
    <div id="predResult" style="margin-top:20px; text-align:center; color:var(--neon); font-weight:bold;"></div>
</div>

<div class="content">
    <h1>Season Insights</h1>
    <div class="grid">
        <div class="glass-card" style="flex:1; text-align:center;">
            <p style="color:#aaa; font-size:0.8em;">TOTAL RUNS</p>
            <h2 id="totalRuns" class="stat-val">0</h2>
        </div>
        <div class="glass-card" style="flex:1; text-align:center;">
            <p style="color:#aaa; font-size:0.8em;">TOTAL WICKETS</p>
            <h2 id="totalWickets" class="stat-val">0</h2>
        </div>
    </div>

    <div class="glass-card">
        <h3>Top Performance Analysis</h3>
        <canvas id="mainChart" height="100"></canvas>
    </div>

    <h1>Comparison Engine</h1>
    <div class="grid">
        <div class="glass-card" style="flex:1">
            <label>PLAYER 1</label>
            <select id="compP1">{% for p in players %}<option>{{p}}</option>{% endfor %}</select>
            <label>PLAYER 2</label>
            <select id="compP2">{% for p in players %}<option>{{p}}</option>{% endfor %}</select>
            <button class="btn-neon" onclick="comparePlayers()" style="margin-top:20px;">⚔️ ANALYZE</button>
        </div>
        <div class="glass-card" style="flex:2">
            <canvas id="compareChart" height="150"></canvas>
        </div>
    </div>
</div>

<script>
// Plugin register takay numbers hamesha dikhein
Chart.register(ChartDataLabels);

let mainChart, compChart;

async function updateDashboard() {
    const team = document.getElementById('teamFilter').value;
    const res = await fetch(`/api/stats?team=${encodeURIComponent(team)}`);
    const data = await res.json();
    document.getElementById('totalRuns').innerText = data.total_runs;
    document.getElementById('totalWickets').innerText = data.total_wickets;
    const ctx = document.getElementById('mainChart').getContext('2d');
    if(mainChart) mainChart.destroy();
    mainChart = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: Object.keys(data.batsmen),
            datasets: [{ 
                label: 'Runs', 
                data: Object.values(data.batsmen), 
                backgroundColor: 'rgba(57, 255, 20, 0.4)', 
                borderColor: '#39ff14', 
                borderWidth: 2,
                borderRadius: 10
            }]
        },
        options: { 
            plugins: { 
                legend: { display: false },
                datalabels: { color: '#fff', anchor: 'end', align: 'top', font: { weight: 'bold' } }
            },
            scales: { y: { ticks: { color: "#888" } }, x: { ticks: { color: "#fff" } } }
        }
    });
}

async function runPrediction() {
    const t1 = document.getElementById('predT1').value;
    const t2 = document.getElementById('predT2').value;
    const v = document.getElementById('predV').value;
    const res = await fetch(`/api/predict?t1=${t1}&t2=${t2}&v=${v}`);
    const data = await res.json();
    document.getElementById('predResult').innerText = `WINNER: ${data.winner} (${data.probability}%)`;
}

async function comparePlayers() {
    const p1 = document.getElementById('compP1').value;
    const p2 = document.getElementById('compP2').value;
    const res = await fetch(`/api/compare?p1=${p1}&p2=${p2}`);
    const data = await res.json();
    const ctx = document.getElementById('compareChart').getContext('2d');
    
    if(compChart) compChart.destroy();
    
    compChart = new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['Total Runs', 'Strike Rate'],
            datasets: [
                { 
                    label: p1, 
                    data: [data[p1].Runs, data[p1].SR], 
                    borderColor: '#39ff14', 
                    backgroundColor: 'rgba(57, 255, 20, 0.2)', 
                    borderWidth: 3,
                    pointRadius: 6
                },
                { 
                    label: p2, 
                    data: [data[p2].Runs, data[p2].SR], 
                    borderColor: '#ff00ff', 
                    backgroundColor: 'rgba(255, 0, 255, 0.2)', 
                    borderWidth: 3,
                    pointRadius: 6
                }
            ]
        },
        options: { 
            plugins: {
                legend: { labels: { color: '#fff', font: { size: 14 } } },
                // Yeh hissa graph ke upar numbers dikhaye ga
                datalabels: {
                    display: true,
                    color: '#fff',
                    align: 'top',
                    backgroundColor: 'rgba(0,0,0,0.5)',
                    borderRadius: 3,
                    font: { size: 12, weight: 'bold' },
                    formatter: function(value) { return value; }
                }
            },
            scales: { 
                r: { 
                    grid: { color: "rgba(255,255,255,0.1)" }, 
                    pointLabels: { color: "#fff", font: { size: 14, weight: 'bold' } }, 
                    ticks: { display: false },
                    suggestedMin: 0
                } 
            }
        }
    });
}

function downloadPDF() {
    const team = document.getElementById('teamFilter').value;
    const t1 = document.getElementById('predT1').value;
    const t2 = document.getElementById('predT2').value;
    const v = document.getElementById('predV').value;
    const p1 = document.getElementById('compP1').value;
    const p2 = document.getElementById('compP2').value;
    window.location.href = `/download_report?team=${encodeURIComponent(team)}&t1=${t1}&t2=${t2}&v=${v}&p1=${p1}&p2=${p2}`;
}

window.onload = updateDashboard;
</script>
</body>
</html>
